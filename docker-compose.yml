version: "3.8"

services:
    app:
        build: ./backend
        container_name: meme-backend
        ports:
            - "5000:5000"
        volumes:
          - ./backend:/app
        env_file:
            - ./backend/.env
        depends_on:
            - mongo
        networks:
            - app-network
        
    mongo:
        image: mongo
        container_name: mongo-db
        volumes:
            - mongo_data:/data/db
        networks:
            - app-network

volumes:
        mongo_data:
    
networks:
        app-network: